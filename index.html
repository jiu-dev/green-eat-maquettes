<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Green Eat — Maquettes</title>
  <style>
    :root {
      --bg: #d9cfb5;
      --green: #18603a;
      --green-dark: #124d2e;
      --cream: #eef0e6;
      --ink: #1f2419;
      --muted: #5d6450;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 64px 24px 80px; }

    header { display: flex; align-items: center; gap: 18px; margin-bottom: 8px; }
    .logo {
      width: 56px; height: 56px; border-radius: 16px; background: var(--green);
      display: flex; align-items: center; justify-content: center; flex: none;
      box-shadow: 0 6px 20px rgba(18,77,46,0.25);
    }
    .logo svg { width: 34px; height: 34px; }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
    .sub { color: var(--muted); font-size: 15px; margin: 6px 0 44px; max-width: 560px; line-height: 1.5; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      display: flex; flex-direction: column;
      background: var(--cream);
      border-radius: 18px;
      padding: 26px 24px;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(18,96,58,0.08);
      transition: transform .18s ease, box-shadow .18s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
      background: var(--green); opacity: .85;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 14px 32px rgba(31,36,25,0.16); }
    .num { font-size: 13px; font-weight: 600; color: var(--green); letter-spacing: .5px; }
    .card h2 { font-size: 19px; font-weight: 650; margin: 10px 0 8px; letter-spacing: -0.3px; }
    .card p { font-size: 14px; color: var(--muted); line-height: 1.45; flex: 1; }
    .open {
      margin-top: 18px; font-size: 14px; font-weight: 600; color: var(--green);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .open svg { width: 15px; height: 15px; transition: transform .18s ease; }
    .card:hover .open svg { transform: translateX(3px); }

    footer { margin-top: 56px; color: var(--muted); font-size: 13px; }

    .themebar { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; flex-wrap: wrap; }
    .themebar .label { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: .3px; }
    .switch { display: inline-flex; background: var(--cream); border-radius: 999px; padding: 4px; border: 1px solid rgba(18,96,58,0.12); }
    .switch button {
      appearance: none; border: 0; background: transparent; cursor: pointer;
      font: inherit; font-size: 14px; font-weight: 600; color: var(--muted);
      padding: 8px 20px; border-radius: 999px; transition: background .18s ease, color .18s ease;
    }
    .switch button.active { background: var(--green); color: var(--cream); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo">
        <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" fill="#eef0e6">
          <path d="M67.47 48.2l-1.11 18.48s3.76 10.64 2.71 25.45c-1.01 14.27-4.8 21.49-5.84 23.99s-3.96 5.63 0 6.88s10.64.63 13.56-.42c2.92-1.04 4.37-6.84 4.8-9.18c1.05-5.79 1.63-16.74-.5-27.54C79.46 77.56 76 63.33 76 63.33L67.47 48.2z"></path>
          <path d="M66.78 45.4s4.28-13.43 14.12-23.62c9.43-9.76 19.06-12.96 26.78-13.92c8.51-1.06 11.98-.95 13.44.1s.94 2.7.97 4.16c.19 10.44.58 23.97-11.7 36.35c-13.11 13.2-22.45 15.57-32.68 16.62c-10.22 1.04-9.06-3.62-9.06-3.62L66.78 45.4z"></path>
          <path d="M2.98 37.05c-.37 1.83 9.29 23.31 27.95 30.07c20.09 7.29 39.03 0 39.03 0l1.56-19.34l-4.75-2.38S56.7 34.29 45.51 30.19c-11.6-4.25-24.71-4.58-33.64.19c-5.6 3-8.69 5.7-8.89 6.67z"></path>
        </svg>
      </span>
      <div>
        <h1>Green Eat — Maquettes</h1>
      </div>
    </header>
    <p class="sub">Galerie des prototypes interactifs. Cliquez sur une maquette pour l'explorer en plein écran.</p>

    <div class="themebar">
      <span class="label">Thème</span>
      <div class="switch" id="switch">
        <button data-theme="classique" class="active">Classique</button>
        <button data-theme="moderne">Moderne</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <footer>Green Eat V1 · Prototypes · <span id="count"></span> maquettes</footer>
  </div>

  <script>
    const maquettes = [
      { file: "auth-onboarding.html",        title: "Auth & Onboarding",          desc: "Inscription, connexion et premiers pas dans l'application." },
      { file: "parcours-consommateur.html",  title: "Parcours consommateur",      desc: "L'expérience côté client : découverte, commande et suivi." },
      { file: "parcours-producteur.html",    title: "Parcours producteur",        desc: "Gestion des produits, stocks et ventes côté producteur." },
      { file: "premium-fidelite-conso.html", title: "Premium & Fidélité (conso)", desc: "Avantages premium et programme de fidélité pour le consommateur." },
      { file: "premium-fidelite-prod.html",  title: "Premium & Fidélité (prod)",  desc: "Offres premium et fidélisation côté producteur." },
      { file: "back-office-manager.html",    title: "Back-office manager",        desc: "Tableau de bord et outils d'administration." },
    ];

    const arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
    const grid = document.getElementById("grid");
    const cards = maquettes.map((m, i) => {
      const a = document.createElement("a");
      a.className = "card";
      a.dataset.file = m.file;
      a.innerHTML =
        '<span class="num">' + String(i + 1).padStart(2, "0") + '</span>' +
        '<h2>' + m.title + '</h2>' +
        '<p>' + m.desc + '</p>' +
        '<span class="open">Ouvrir la maquette ' + arrow + '</span>';
      grid.appendChild(a);
      return a;
    });
    document.getElementById("count").textContent = maquettes.length;

    const themes = ["classique", "moderne"];
    let theme = localStorage.getItem("ge-theme");
    if (!themes.includes(theme)) theme = "classique";

    function applyTheme(t) {
      theme = t;
      localStorage.setItem("ge-theme", t);
      cards.forEach(c => { c.href = "maquettes/" + t + "/" + c.dataset.file; });
      document.querySelectorAll("#switch button").forEach(b => {
        b.classList.toggle("active", b.dataset.theme === t);
      });
    }

    document.querySelectorAll("#switch button").forEach(b => {
      b.addEventListener("click", () => applyTheme(b.dataset.theme));
    });
    applyTheme(theme);
  </script>
</body>
</html>
